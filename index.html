<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Areeba meri jaan</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff85a1;
            --accent: #ffd700;
            --bg: #fff0f3;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--bg);
            font-family: 'Poppins', sans-serif;
        }

        /* Magical Background Particles */
        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: float-sparkle 5s infinite linear;
        }

        @keyframes float-sparkle {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100vh) scale(1.2); opacity: 0; }
        }

        /* Initial Screen: The Gift Box */
        #welcome-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle, #ffccd5, #fff0f3);
            cursor: pointer;
            transition: 0.8s ease-out;
        }

        .gift-box {
            font-size: 100px;
            animation: bounce-box 1.5s infinite ease-in-out;
        }

        @keyframes bounce-box {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.1); }
        }

        .click-text {
            margin-top: 20px;
            font-weight: 500;
            color: var(--primary);
            letter-spacing: 2px;
            animation: pulse 1s infinite;
        }

        /* Main Birthday Card Content (Hidden initially) */
        #main-content {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            opacity: 0;
            transition: opacity 1.5s ease-in;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(255, 77, 109, 0.2);
            max-width: 500px;
            text-align: center;
            position: relative;
            border: 8px solid #fff;
            outline: 2px solid var(--secondary);
        }

        /* Cartoon Meeting Animation */
        .meeting-animation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 80%;
            margin: 0 auto 20px;
            position: relative;
        }

        .heart-icon { font-size: 40px; }
        .path {
            flex-grow: 1;
            border-top: 3px dashed var(--secondary);
            margin: 0 10px;
            position: relative;
        }

        .plane {
            position: absolute;
            top: -20px;
            left: 0;
            font-size: 20px;
            animation: fly 4s infinite linear;
        }

        @keyframes fly {
            0% { left: 0; transform: rotate(0deg); }
            50% { top: -25px; }
            100% { left: 90%; transform: rotate(10deg); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--primary);
            font-size: 2.8rem;
            margin-bottom: 15px;
        }

        .message-text {
            color: #444;
            line-height: 1.8;
            font-size: 1.05rem;
            min-height: 120px;
        }

        .signature {
            margin-top: 20px;
            font-weight: 700;
            color: var(--primary);
            font-size: 1.2rem;
        }

        /* Floating decorations */
        .floater {
            position: absolute;
            animation: floating 3s infinite ease-in-out;
            z-index: -1;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

    </style>
</head>
<body>

    <!-- Sparkle Particles Container -->
    <div id="sparkle-container"></div>

    <!-- Screen 1: The Surprise -->
    <div id="welcome-screen" onclick="showWish()">
        <div class="gift-box">🎁</div>
        <div class="click-text">FOR AREEBA MERI JAAN<br>Click to Open</div>
    </div>

    <!-- Screen 2: The Birthday Card -->
    <div id="main-content">
        <!-- Floating Cartoon Elements -->
        <span class="floater" style="top:10%; left:10%; font-size: 40px;">🎈</span>
        <span class="floater" style="top:20%; right:15%; font-size: 30px; animation-delay: 1s;">✨</span>
        <span class="floater" style="bottom:15%; left:15%; font-size: 35px; animation-delay: 0.5s;">☁️</span>
        <span class="floater" style="bottom:10%; right:10%; font-size: 45px; animation-delay: 1.5s;">🌸</span>

        <div class="card">
            <!-- Distance bridging animation -->
            <div class="meeting-animation">
                <div class="heart-icon">🏠❤️</div>
                <div class="path">
                    <div class="plane">✈️</div>
                </div>
                <div class="heart-icon">❤️🏠</div>
            </div>

            <h1>Happy Birthday, Areeba!</h1>
            
            <div class="message-text" id="typewriter"></div>
            
            <div class="signature">I Love You Endlessly 💫</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <script>
        // Create Sparkle background
        const container = document.getElementById('sparkle-container');
        for (let i = 0; i < 50; i++) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            const size = Math.random() * 5 + 2 + 'px';
            sparkle.style.width = size;
            sparkle.style.height = size;
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = Math.random() * 100 + 'vh';
            sparkle.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(sparkle);
        }

        const message = "Happy Birthday, Areeba meri jaan ❤️ I love you so much. Another year has passed without you, but distance really doesn’t matter—my heart is always yours. InshaAllah, one day we’ll finally meet and make up for all this time. I miss you more than words can say. I love you endlessly 💫";

        function showWish() {
            // Transition screens
            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-screen').style.display = 'none';
                const mainContent = document.getElementById('main-content');
                mainContent.style.display = 'flex';
                setTimeout(() => mainContent.style.opacity = '1', 50);
                
                // Trigger Typewriter
                startTypewriter();
                
                // Trigger Confetti
                celebrate();
            }, 800);
        }

        function startTypewriter() {
            let i = 0;
            const element = document.getElementById("typewriter");
            function type() {
                if (i < message.length) {
                    element.innerHTML += message.charAt(i);
                    i++;
                    setTimeout(type, 50);
                }
            }
            type();
        }

        function celebrate() {
            var count = 200;
            var defaults = { origin: { y: 0.7 }, zIndex: 1000 };

            function fire(particleRatio, opts) {
                confetti(Object.assign({}, defaults, opts, {
                    particleCount: Math.floor(count * particleRatio)
                }));
            }

            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });
        }
    </script>
</body>
</html>
